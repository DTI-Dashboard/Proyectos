name: Generar Reporte Semanal

on:
  workflow_dispatch:

jobs:
  generar-reporte:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install python-pptx lxml

      - name: Ejecutar generar_reporte_semanal.py
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python generar_reporte_semanal.py

      - name: Guardar log de error si falló
        if: failure()
        run: |
          git config user.name  "DTI-Dashboard Bot"
          git config user.email "bot@dti-dashboard.github.io"
          git add reporte_last_error.txt || true
          git diff --staged --quiet || git commit -m "reporte: error log"
          git pull --rebase origin main || true
          git push || true
