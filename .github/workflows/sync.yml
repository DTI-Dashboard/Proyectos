name: Sync Smartsheet → Dashboard

on:
  schedule:
    - cron: '0 * * * *'   # cada hora en punto
  workflow_dispatch:        # también se puede correr manualmente con un clic

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar sync.py
        env:
          SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
        run: python sync.py

      - name: Guardar cambios en el repo
        run: |
          git config user.name  "DTI-Dashboard Bot"
          git config user.email "bot@dti-dashboard.github.io"
          git add index.html
          git diff --staged --quiet || git commit -m "sync: actualización automática desde Smartsheet $(date +'%d/%m/%Y %H:%M')"
          git push
